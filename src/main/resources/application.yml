spring:
  application:
    name: personal-finance-manager

  datasource:
    url: jdbc:h2:file:./finance-db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update        # creates/updates schema automatically on startup
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Suppress Spring Kafka auto-config warnings when broker is not running
  kafka:
    bootstrap-servers: localhost:9092

# App flags
app:
  kafka:
    enabled: false            # set to true when a Kafka broker is available
